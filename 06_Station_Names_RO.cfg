// GonsyPatch - 06_Station_Names_RO.cfg
//
// PURPOSE: Give every ground station a unique City2 `name` so that
//          RACommNetUI creates one map icon per station instance.
//          This is the RealismOverhaul variant of 05_Station_Names.cfg.
//
// WHY THIS EXISTS:
//   Sol-Configs RealAntennas-RO.cfg sets RACommNetStation = True on all
//   *TrackingStation nodes but does not rename all stations that share a name.
//   RACommNetUI (RealAntennas) calls AddGroundStationSiteNode once per unique
//   City2 name. Stations sharing a name (DSNTrackingStation x3,
//   STDNTrackingStation x4, MSFNTrackingStation x5, NIPTrackingStation x2,
//   LaunchSiteTrackingStation x25) produce only ONE map icon between them.
//   Renaming each instance makes every station visible on the map.
//
// WHY :FINAL PHASE:
//   Sol-Configs RealAntennas-RO.cfg applies DSN-specific antenna configs to
//   @City2[DSNTrackingStation],* using the AFTER[zRealAntennas] phase.
//   This file must run AFTER that, or renaming DSNTrackingStation → Goldstone/
//   Canberra/Madrid first would prevent RO.cfg from finding them by name.
//   Using :FINAL guarantees execution after all :AFTER[zRealAntennas] patches.
//
// WHY @commnetStation = False:
//   Earth-CommNet_Stations.cfg sets commnetStation = True on all stations.
//   RealAntennas-RO.cfg uses %commnetStation = False which cannot overwrite
//   a value that already exists — so stations keep commnetStation = True.
//   The fix here forces it to False so stations only register with RA, not
//   the stock CommNet system simultaneously.
//
// ACTIVATION: NEEDS[RealAntennas,RealismOverhaul] — counterpart of
//             05_Station_Names.cfg which uses NEEDS[RealAntennas,!RealismOverhaul].

@Kopernicus:FINAL:NEEDS[RealAntennas,RealismOverhaul]
{
    @Body[Earth]
    {
        @PQS
        {
            @Mods
            {
                // Fix commnetStation — force False on all stations so they register
                // exclusively with RealAntennas, not with stock CommNet too.
                @City2[*TrackingStation],*
                {
                    @commnetStation = False
                }

                // ----------------------------------------------------------------
                // DSN — Deep Space Network  (3 instances → 3 unique names)
                // RealAntennas-RO.cfg applies DSN antenna config while they still
                // share the name DSNTrackingStation; we rename them here after that.
                // ----------------------------------------------------------------
                @City2[DSNTrackingStation]:HAS[#objectName[DSS?14*]]
                {
                    @name = GoldstoneTrackingStation
                }
                @City2[DSNTrackingStation]:HAS[#objectName[DSS?43*]]
                {
                    @name = CanberraTrackingStation
                }
                @City2[DSNTrackingStation]:HAS[#objectName[DSS?63*]]
                {
                    @name = MadridTrackingStation
                }

                // ----------------------------------------------------------------
                // STDN — Spaceflight Tracking and Data Network  (4 remaining)
                // (Johannesburg already renamed to HartebeesthoekTrackingStation
                //  by RealAntennas-RO.cfg)
                // ----------------------------------------------------------------
                @City2[STDNTrackingStation]:HAS[#objectName[STDN?-?Quito]]
                {
                    @name = QuitoTrackingStation
                }
                @City2[STDNTrackingStation]:HAS[#objectName[STDN?-?Ascension]]
                {
                    @name = AscensionTrackingStation
                }
                @City2[STDNTrackingStation]:HAS[#objectName[STDN?-?Tananarive]]
                {
                    @name = TananarivеTrackingStation
                }
                @City2[STDNTrackingStation]:HAS[#objectName[STDN?-?Carnarvon]]
                {
                    @name = CarnarvonTrackingStation
                }

                // ----------------------------------------------------------------
                // MSFN — Manned Space Flight Network  (5 instances → 5 unique)
                // ----------------------------------------------------------------
                @City2[MSFNTrackingStation]:HAS[#objectName[MSFN?-?Kauai]]
                {
                    @name = KauaiTrackingStation
                }
                @City2[MSFNTrackingStation]:HAS[#objectName[MSFN?-?Guaymas]]
                {
                    @name = GuaymasTrackingStation
                }
                @City2[MSFNTrackingStation]:HAS[#objectName[MSFN?-?Grand*]]
                {
                    @name = GrandCanaryTrackingStation
                }
                @City2[MSFNTrackingStation]:HAS[#objectName[MSFN?-?Kano]]
                {
                    @name = KanoTrackingStation
                }
                @City2[MSFNTrackingStation]:HAS[#objectName[MSFN?-?BDA*]]
                {
                    @name = BermudaTrackingStation
                }

                // ----------------------------------------------------------------
                // NIP minor Soviet stations  (2 instances → 2 unique names)
                // NIP16/15/14 already have unique names from RealAntennas-RSS.cfg
                // ----------------------------------------------------------------
                @City2[NIPTrackingStation]:HAS[#objectName[NIP?4*]]
                {
                    @name = YeniseiskTrackingStation
                }
                @City2[NIPTrackingStation]:HAS[#objectName[NIP?6*]]
                {
                    @name = VulkannyTrackingStation
                }

                // ----------------------------------------------------------------
                // LaunchSiteTrackingStation — 25 remaining instances
                // (Wallops, WhiteSands, Esrange already renamed by RealAntennas-RO.cfg)
                // ----------------------------------------------------------------
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[AU?-?Woomera]]
                {
                    @name = WoomeraTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[CA?-?Churchill]]
                {
                    @name = ChurchillTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[CN?-?Jiuquan]]
                {
                    @name = JiuquanTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[CN?-?Taiyuan]]
                {
                    @name = TaiyuanTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[CN?-?Wenchang]]
                {
                    @name = WenchangTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[CN?-?Xichang]]
                {
                    @name = XichangTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[DZ?-?Hammaguir]]
                {
                    @name = HammaguirTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[FR?-?Kourou]]
                {
                    @name = KourouTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[IL?-?Palmachim]]
                {
                    @name = PalmachimTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[IN?-?Satish*]]
                {
                    @name = SatishDhawanTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[IR?-?Semnan]]
                {
                    @name = SemnanTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[JP?-?Tanegashima]]
                {
                    @name = TanegashimaTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[JP?-?Uchinoura]]
                {
                    @name = UchinouraTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[KP?-?Sohae]]
                {
                    @name = SohaeTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[KR?-?Naro]]
                {
                    @name = NaroTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[KZ?-?Baikonur]]
                {
                    @name = BaikonurTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[MH?-?Omelek]]
                {
                    @name = OmelekTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[NZ?-?Mahia]]
                {
                    @name = MahiaTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[RU?-?Kapustin*]]
                {
                    @name = KapustinYarTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[RU?-?Plesetsk]]
                {
                    @name = PlesetskTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[RU?-?Svobodny]]
                {
                    @name = SvobodnyTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[RU?-?Yasny]]
                {
                    @name = YasnyTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[US?-?Brownsville]]
                {
                    @name = BrownsvilleTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[US?-?Kodiak]]
                {
                    @name = KodiakTrackingStation
                }
                @City2[LaunchSiteTrackingStation]:HAS[#objectName[US?-?Vandenberg]]
                {
                    @name = VandenbergTrackingStation
                }
            }
        }
    }
}
