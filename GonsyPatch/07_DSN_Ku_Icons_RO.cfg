// GonsyPatch - 07_DSN_Ku_Icons_RO.cfg
//
// PURPOSE:
//   1. Assign a map icon to every ground station (radio-antenna by default,
//      DSN dish for the three DSN stations and the two major NIP stations).
//   2. Add Ku-band antenna capability to the three DSN stations.
//
// WHY TWO SEPARATE KOPERNICUS BLOCKS:
//
//   BLOCK 1 — :AFTER[zRealAntennas]  (icons only)
//     ModuleManager processes AFTER[zRealAntennas] patches in alphabetical
//     folder order.  GameData\GonsyPatch\ (G) comes before GameData\Sol-Configs\
//     (S), so this block runs BEFORE Sol-Configs/RealAntennas-RO.cfg.
//     Icons are %icon fields on the City2 node itself; Sol-Configs' global
//       @City2[*TrackingStation],* { !Antenna,* {} ... }
//     only deletes child Antenna nodes — it never touches %icon.  So icons set
//     here survive Sol-Configs processing unchanged.
//     Execution order for icons:
//       1. This file sets %icon = radio-antenna on ALL *TrackingStation nodes.
//       2. This file overrides DSNTrackingStation to %icon = DSN (while the
//          three DSN stations still share that name, before :FINAL renaming).
//       3. Sol-Configs/RealAntennas-RO.cfg sets %icon = DSN on NIP16 and NIP15
//          (overriding the radio-antenna set in step 1 — correct end state).
//
//   BLOCK 2 — :FINAL  (Ku-band antennas)
//     Sol-Configs' AFTER[zRealAntennas] global block does  !Antenna,* {}
//     on every tracking station, wiping any Antenna nodes we add in that phase.
//     Sol-Configs then rebuilds the antenna list for each station type.
//     Adding Ku after all of that means using :FINAL.
//     By :FINAL, 06_Station_Names_RO.cfg (which runs alphabetically before this
//     file in the same :FINAL phase, 06_ < 07_) has already renamed the three
//     DSN stations to GoldstoneTrackingStation, CanberraTrackingStation, and
//     MadridTrackingStation — so we target each by its new unique name.
//
// KU-BAND VALUES:
//   The DSN 34m Beam Waveguide (BWG) antennas gained Ku-band capability in the
//   late 1980s / early 1990s primarily for TDRSS relay operations.
//   Gain:  34m dish at 14.5 GHz, η ≈ 0.55  →  ~72 dBi.
//   Cross-check vs. the existing Ka-band entry (79 dBi @ 32 GHz, 34m):
//     79 − 20·log10(32000/14500) ≈ 72 dBi  ✓
//
// ACTIVATION: NEEDS[RealAntennas,RealismOverhaul]


// ============================================================
//  BLOCK 1 — Icon assignment  (:AFTER[zRealAntennas])
//  Must run in this phase so DSNTrackingStation still exists
//  as a selector (before :FINAL renames it).
// ============================================================
@Kopernicus:AFTER[zRealAntennas]:NEEDS[RealAntennas,RealismOverhaul]
{
    @Body[Earth]
    {
        @PQS
        {
            @Mods
            {
                // Default icon for every tracking station.
                // Sol-Configs never sets icons, so without this patch most
                // stations show the stock KSP marker instead of an antenna.
                @City2[*TrackingStation],*
                {
                    %icon = RealAntennas/radio-antenna
                }

                // DSN override — large dish icon.
                // At this point Goldstone, Canberra and Madrid all share the
                // name DSNTrackingStation; one selector covers all three.
                @City2[DSNTrackingStation],*
                {
                    %icon = RealAntennas/DSN
                }
                // NOTE: NIP16 and NIP15 will be overridden to DSN by
                // Sol-Configs/RealAntennas-RO.cfg which runs after this file
                // in the same phase — that is the intended final state.
            }
        }
    }
}


// ============================================================
//  BLOCK 2 — DSN Ku-band antennas  (:FINAL)
//  Must run in :FINAL because Sol-Configs' AFTER[zRealAntennas]
//  global patch does  !Antenna,* {}  which would delete any
//  Antenna nodes added in the earlier phase.
//  By :FINAL, 06_Station_Names_RO.cfg has already renamed the
//  three DSN stations to their unique names.
// ============================================================
@Kopernicus:FINAL:NEEDS[RealAntennas,RealismOverhaul]
{
    @Body[Earth]
    {
        @PQS
        {
            @Mods
            {
                @City2[GoldstoneTrackingStation]
                {
                    Antenna
                    {
                        // 34m BWG dish, Ku-band — relay / TDRSS compatibility.
                        // BWG antennas commissioned 1988–1994 with Ku capability.
                        referenceGain = 72          // 34m at 14.5 GHz, η = 0.55
                        referenceFrequency = 14500
                        TxPower = 55                // comparable to Ka transmitter
                        TechLevel = 8               // "Massive Scale Comms" 1986–1997
                        RFBand = Ku
                        AMWTemp = 20
                        ModulationBits = 2

                        UPGRADE
                        {
                            TechLevel = 9           // "Efficient Comms" 1998–2008
                            ModulationBits = 3
                        }
                    }
                }

                @City2[CanberraTrackingStation]
                {
                    Antenna
                    {
                        referenceGain = 72
                        referenceFrequency = 14500
                        TxPower = 55
                        TechLevel = 8
                        RFBand = Ku
                        AMWTemp = 20
                        ModulationBits = 2

                        UPGRADE
                        {
                            TechLevel = 9
                            ModulationBits = 3
                        }
                    }
                }

                @City2[MadridTrackingStation]
                {
                    Antenna
                    {
                        referenceGain = 72
                        referenceFrequency = 14500
                        TxPower = 55
                        TechLevel = 8
                        RFBand = Ku
                        AMWTemp = 20
                        ModulationBits = 2

                        UPGRADE
                        {
                            TechLevel = 9
                            ModulationBits = 3
                        }
                    }
                }
            }
        }
    }
}
